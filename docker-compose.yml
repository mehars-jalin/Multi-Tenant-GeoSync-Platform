services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geosync
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geosync"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/geosync
      ROOT_DOMAIN: localhost
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  app_node_modules:
  app_next:
